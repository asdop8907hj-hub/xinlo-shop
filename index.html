<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>BINPG</title>
  <meta name="description" content="BINPG 官方渠道导航">
  <meta name="theme-color" content="#0a0a0a">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      top: -40%;
      left: -20%;
      width: 80%;
      height: 100%;
      background: radial-gradient(circle at 50% 40%, rgba(100, 120, 255, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: bgGlow 8s ease-in-out infinite alternate;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -30%;
      right: -15%;
      width: 70%;
      height: 90%;
      background: radial-gradient(circle at 60% 70%, rgba(255, 150, 80, 0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: bgGlow 10s ease-in-out infinite alternate-reverse;
    }

    @keyframes bgGlow {
      0% {
        opacity: 0.4;
        transform: scale(1);
      }
      100% {
        opacity: 0.8;
        transform: scale(1.05);
      }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .logo-link {
      display: block;
      text-decoration: none;
      margin-bottom: 2.5rem;
    }

    .logo {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #6e8efb, #a777e3, #f8a5c2);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: logoShine 4s ease-in-out infinite;
      line-height: 1.1;
    }

    .logo-sub {
      font-size: 0.75rem;
      color: #555;
      font-weight: 400;
      letter-spacing: 0.04em;
      margin-top: 0.25rem;
      -webkit-text-fill-color: #555;
      background: none;
      animation: none;
    }

    @keyframes logoShine {
      0%,
      100% {
        background-position: 0% center;
      }
      50% {
        background-position: 100% center;
      }
    }

    .btn-list {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.95rem 1.5rem;
      border-radius: 3rem;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1.2);
      cursor: pointer;
      letter-spacing: 0.02em;
      position: relative;
      overflow: hidden;
    }

    .social-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .social-btn:active {
      transform: scale(0.97);
      transition: transform 0.1s ease;
    }

    .social-btn i {
      font-size: 1.3rem;
      width: 28px;
      text-align: center;
      filter: drop-shadow(0 0 4px rgba(255,255,255,0.3));
    }

    .btn-x {
      background: linear-gradient(135deg, #1a1a1a 0%, #444444 100%);
      border-color: rgba(255,255,255,0.1);
    }
    .btn-x:hover {
      background: linear-gradient(135deg, #2a2a2a 0%, #555555 100%);
    }

    .btn-ins {
      background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      border-color: rgba(255,255,255,0.2);
    }

    .btn-fb {
      background: linear-gradient(135deg, #1877f2 0%, #0c5dc7 100%);
      border-color: rgba(24,119,242,0.3);
    }

    .btn-tg-main {
      background: linear-gradient(135deg, #2AABEE 0%, #229ED9 100%);
      border-color: rgba(42,171,238,0.3);
    }

    .btn-tg-ad {
      background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
      border-color: rgba(255,107,53,0.3);
    }

    .btn-game {
      background: linear-gradient(135deg, #c471ed 0%, #f64f59 100%);
      border-color: rgba(255,77,109,0.3);
      justify-content: center;
    }
    .btn-game i {
      color: #fff;
    }

    /* 子菜单 */
    .sub-menu {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s ease, margin 0.3s ease;
      opacity: 0;
      margin-top: 0;
      padding: 0 0.5rem;
    }
    .sub-menu.open {
      max-height: 200px;
      opacity: 1;
      margin-top: 0.25rem;
    }

    .sub-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.7rem 1.2rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: all 0.25s ease;
      cursor: pointer;
    }
    .sub-btn:hover {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.35);
    }

    .footer {
      margin-top: 2.5rem;
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 0.03em;
    }

    @media (max-width: 480px) {
      .container {
        max-width: 100%;
      }
      .logo {
        font-size: 2.5rem;
      }
      .social-btn {
        padding: 0.85rem 1.2rem;
        font-size: 0.95rem;
      }
      .social-btn i {
        font-size: 1.15rem;
        width: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo 同时也是主网页链接 -->
    <a href="https://binpg.com" class="logo-link" target="_blank" rel="noopener noreferrer">
      <div class="logo">BINPG</div>
      <div class="logo-sub">.com</div>
    </a>

    <!-- 按钮列表 -->
    <div class="btn-list">
      <!-- X (Twitter) -->
      <a href="https://x.com/binpg_x" target="_blank" rel="noopener noreferrer" class="social-btn btn-x">
        <i class="fab fa-x-twitter"></i>
      </a>

      <!-- Instagram -->
      <a href="https://instagram.com/binpg_ins" target="_blank" rel="noopener noreferrer" class="social-btn btn-ins">
        <i class="fab fa-instagram"></i>
      </a>

      <!-- Facebook -->
      <a href="https://facebook.com/binpgfb" target="_blank" rel="noopener noreferrer" class="social-btn btn-fb">
        <i class="fab fa-facebook-f"></i>
      </a>

      <!-- Telegram 主频道 -->
      <a href="https://t.me/binpg" target="_blank" rel="noopener noreferrer" class="social-btn btn-tg-main">
        <i class="fab fa-telegram-plane"></i>
      </a>

      <!-- 广告投放 -->
      <a href="https://t.me/ooesebot" target="_blank" rel="noopener noreferrer" class="social-btn btn-tg-ad">
        <i class="fas fa-bullhorn"></i>
      </a>

      <!-- 娱乐室 -->
      <div class="social-btn btn-game" id="gameBtn">
        <i class="fas fa-gamepad"></i>
      </div>
      <div class="sub-menu" id="subMenu">
        <a href="https://sef32.top" target="_blank" rel="noopener noreferrer" class="sub-btn">
          <span>娱乐1</span>
        </a>
        <a href="https://xj.cc" target="_blank" rel="noopener noreferrer" class="sub-btn">
          <span>娱乐2</span>
        </a>
      </div>
    </div>

    <div class="footer">© 2025 BINPG. All rights reserved.</div>
  </div>

  <script>
    const gameBtn = document.getElementById('gameBtn');
    const subMenu = document.getElementById('subMenu');
    gameBtn.addEventListener('click', function(e) {
      e.preventDefault();
      subMenu.classList.toggle('open');
    });
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
</body>
</html>
