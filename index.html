    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff; overflow: hidden; margin: 0; overscroll-behavior: none;
    }
    body::before {
      content: ''; position: fixed; top: -30%; right: -20%; width: 70%; height: 80%;
      background: radial-gradient(circle at 70% 30%, rgba(120,120,255,0.04) 0%, transparent 60%);
      pointer-events: none; z-index: 0; animation: bgGlow 12s ease-in-out infinite alternate;
    }
    body::after {
      content: ''; position: fixed; bottom: -20%; left: -15%; width: 60%; height: 70%;
      background: radial-gradient(circle at 30% 70%, rgba(255,180,100,0.03) 0%, transparent 60%);
      pointer-events: none; z-index: 0; animation: bgGlow 15s ease-in-out infinite alternate-reverse;
    }
    @keyframes bgGlow { 0% { opacity: 0.6; transform: scale(1); } 100% { opacity: 1; transform: scale(1.08); } }

    .page-container {
      display: flex; width: 200%; height: 100vh; height: 100dvh;
      transition: transform 0.65s cubic-bezier(0.32, 0.72, 0, 1); will-change: transform; position: relative; z-index: 1;
    }
    .page {
      width: 50%; height: 100vh; height: 100dvh; overflow-y: auto; overflow-x: hidden;
      padding: 2rem; scrollbar-width: thin; scrollbar-color: #d0d0d0 transparent; -webkit-overflow-scrolling: touch;
    }
    .page::-webkit-scrollbar { width: 5px; }
    .page::-webkit-scrollbar-track { background: transparent; }
    .page::-webkit-scrollbar-thumb { background-color: #d0d0d0; border-radius: 10px; }

    @keyframes dropIn {
      0% { transform: translateY(-140px); opacity: 0; }
      60% { transform: translateY(8px); opacity: 1; }
      80% { transform: translateY(-4px); }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes rainbowFlow {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes subtlePulse {
      0%, 100% { box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
      50% { box-shadow: 0 14px 34px rgba(0,0,0,0.25); }
    }
    @keyframes modalSlideUp {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .rainbow-text-animate {
      background: linear-gradient(90deg, #ff4d4d, #ffb347, #ffe066, #69db7e, #4dabf7, #da77f2, #ff4d4d);
      background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent;
      animation: dropIn 1s cubic-bezier(0.22, 0.61, 0.36, 1) forwards,
                 rainbowFlow 2.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      letter-spacing: -0.03em;
    }
    .rainbow-text-static {
      background: linear-gradient(90deg, #ff6b6b, #fca13e, #f8e81c, #56c596, #5c9cec, #ae7ef2, #ff6b6b);
      background-size: 150% auto; -webkit-background-clip: text; background-clip: text; color: transparent;
      animation: none; letter-spacing: -0.03em;
    }

    .fade-in-up { animation: fadeInUp 0.7s cubic-bezier(0.32, 0.72, 0, 1) forwards; opacity: 0; }
    .fade-in-up:nth-child(1) { animation-delay: 1.2s; }
    .fade-in-up:nth-child(2) { animation-delay: 1.4s; }
    .fade-in-up:nth-child(3) { animation-delay: 1.6s; }

    .btn-view-price {
      animation: fadeInUp 0.7s cubic-bezier(0.32, 0.72, 0, 1) forwards,
                 subtlePulse 3s ease-in-out 2.5s infinite;
      animation-delay: 1.8s, 2.5s; opacity: 0;
    }
    .btn-copyright { animation: fadeInUp 0.7s cubic-bezier(0.32, 0.72, 0, 1) forwards; animation-delay: 2s; opacity: 0; }

    .page-1-content { transition: all 0.55s cubic-bezier(0.32, 0.72, 0, 1); }
    .page-1-content.shifted { opacity: 0.3; transform: scale(0.96); pointer-events: none; }
    .page-2-content { transition: all 0.55s cubic-bezier(0.32, 0.72, 0, 1); opacity: 0.5; transform: translateX(30px); }
    .page-2-content.entered { opacity: 1; transform: translateX(0); }

    .slide-arrow { transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1); }
    button:hover .slide-arrow { transform: translateX(8px); }

    .price-card {
      transition: transform 0.35s, box-shadow 0.35s; background: #fff; border-radius: 1.5rem;

    .price-card:hover { transform: translateY(-6px); box-shadow: 0 18px 36px rgba(0,0,0,0.1); }

    .card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
    @media (max-width: 768px) { .card-grid { grid-template-columns: 1fr; } .page { padding: 1.25rem; } }

    .lang-select-wrapper { position: fixed; top: 1.5rem; left: 1.5rem; z-index: 60; }
    .lang-select {
      background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0,0,0,0.08);

      background-repeat: no-repeat; background-position: right 0.7rem center;
    }

    .nav-btn { padding: 0.6rem 1.2rem; border-radius: 2rem; font-weight: 500; border: none; background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); color: #555; cursor: pointer; }
    .address-book-btn { background: none; border: none; color: #555; cursor: pointer; padding: 0.5rem; border-radius: 50%; transition: all 0.2s; }
    .address-book-btn:hover { background: rgba(0,0,0,0.05); color: #111; }

    .cta-btn {
      display: inline-flex; align-items: center; padding: 1rem 2.5rem; background: #1d1d1f; color: white;
      font-weight: 600; border-radius: 3rem; box-shadow: 0 8px 24px rgba(0,0,0,0.15); transition: all 0.35s;
      border: none; font-size: 1.05rem; min-height: 56px;
    }
    .cta-btn:hover { background: #000; transform: translateY(-3px); }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(8px);
      z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-content {
      background: white; border-radius: 2rem; padding: 2rem; max-width: 500px; width: 90%;
      max-height: 85vh; overflow-y: auto; box-shadow: 0 30px 60px rgba(0,0,0,0.2);
      animation: modalSlideUp 0.45s cubic-bezier(0.32, 0.72, 0, 1); position: relative;
    }
    .color-dot {
      width: 28px; height: 28px; border-radius: 50%; display: inline-block; border: 2px solid transparent; cursor: pointer; transition: all 0.2s; margin: 0 4px;

    .color-dot.selected { border-color: #1d1d1f; transform: scale(1.15); }

    .back-to-top {

        { series:'samsung', name:'Galaxy S24+', storage:['256GB','512GB'], descKey:'s24PlusDesc', prices:[519.00,579.00], colors:['#1d1d1f','#c0c0c0','#4a6fa5','#e8d5b7'], colorNames:['Phantom Black','Silver','Cobalt Violet','Amber Yellow'] },
        { series:'samsung', name:'Galaxy S24 Ultra', storage:['256GB','512GB','1TB'], descKey:'s24UltraDesc', prices:[699.00,769.00,889.00], colors:['#1d1d1f','#c0c0c0','#4a6fa5','#e8d5b7'], colorNames:['Titanium Black','Titanium Silver','Titanium Violet','Titanium Yellow'] },
        { series:'samsung', name:'Galaxy S25', storage:['128GB','256GB'], descKey:'s25Desc', prices:[439.00,489.00], colors:['#1d1d1f','#c0c0c0','#4a6fa5','#e8d5b7'], colorNames:['Phantom Black','Silver','Cobalt Violet','Amber Yellow'] },
        { series:'samsung', name:'Galaxy S25+', storage:['256GB','512GB'], descKey:'s25PlusDesc', prices:[559.00,619.00], colors:['#1d1d1f','#c0c0c0','#4a6fa5','#e8d5b7'], colorNames:['Phantom Black','Silver','Cobalt Violet','Amber Yellow'] },
        { series:'samsung', name:'Galaxy S25 Ultra', storage:['256GB','512GB','1TB'], descKey:'s25UltraDesc', prices:[739.00,809.00,929.00], colors:['#1d1d1f','#c0c0c0','#4a6fa5','#e8d5b7'], colorNames:['Titanium Black','Titanium Silver','Titanium Violet','Titanium Yellow'] },
        { series:'samsung', name:'Galaxy Z Flip 6', storage:['256GB','512GB'], descKey:'zFlip6Desc', prices:[599.00,659.00], colors:['#1d1d1f','#c0c0c0','#4a6fa5','#e8d5b7'], colorNames:['Phantom Black','Silver','Blue','Yellow'] },
        { series:'samsung', name:'Galaxy Z Fold 6', storage:['256GB','512GB','1TB'], descKey:'zFold6Desc', prices:[1099.00,1199.00,1329.00], colors:['#1d1d1f','#c0c0c0','#4a6fa5'], colorNames:['Phantom Black','Silver','Blue'] },
        { series:'pixel', name:'Pixel 8', storage:['128GB','256GB'], descKey:'pixel8Desc', prices:[349.00,399.00], colors:['#1d1d1f','#f5f5f0','#bfa08a'], colorNames:['Obsidian','Porcelain','Hazel'] },
        { series:'pixel', name:'Pixel 8 Pro', storage:['128GB','256GB','512GB'], descKey:'pixel8ProDesc', prices:[489.00,559.00,639.00], colors:['#1d1d1f','#f5f5f0','#bfa08a'], colorNames:['Obsidian','Porcelain','Hazel'] },
        { series:'pixel', name:'Pixel 9', storage:['128GB','256GB'], descKey:'pixel9Desc', prices:[399.00,449.00], colors:['#1d1d1f','#f5f5f0','#bfa08a','#5f9ea0'], colorNames:['Obsidian','Porcelain','Hazel','Bay'] },
        { series:'pixel', name:'Pixel 9 Pro', storage:['128GB','256GB','512GB'], descKey:'pixel9ProDesc', prices:[539.00,609.00,689.00], colors:['#1d1d1f','#f5f5f0','#bfa08a','#5f9ea0'], colorNames:['Obsidian','Porcelain','Hazel','Bay'] },
        { series:'pixel', name:'Pixel 9 Pro XL', storage:['128GB','256GB','512GB','1TB'], descKey:'pixel9ProXLDesc', prices:[619.00,689.00,769.00,899.00], colors:['#1d1d1f','#f5f5f0','#bfa08a','#5f9ea0'], colorNames:['Obsidian','Porcelain','Hazel','Bay'] }
      ];

      // DOM 元素
      const slider = document.getElementById('pageSlider');
      const page1Content = document.getElementById('page1Content');
      const page2Content = document.getElementById('page2Content');
      const pricePage = document.getElementById('pricePage');
      const backToTopBtn = document.getElementById('backToTop');
      const productModal = document.getElementById('productModal');
      const addressModal = document.getElementById('addressModal');
      const addressBookModal = document.getElementById('addressBookModal');
      const paymentModal = document.getElementById('paymentModal');

      let currentLang = 'en';
      let currentCategory = 'iphone';
      let currentProductPrice = 0;
      let currentProduct = null;

      // 地址存储 (localStorage)
      function getSavedAddresses() {
        try { return JSON.parse(localStorage.getItem('xinlo_addresses') || '[]'); } catch(e) { return []; }
      }
      function saveAddresses(addresses) { localStorage.setItem('xinlo_addresses', JSON.stringify(addresses)); }

      function updateAllTexts() {
        document.getElementById('subTagline').textContent = getTrans('tagline');
        const intros = document.querySelectorAll('#introText p');
        if(intros.length >= 3){
          intros[0].textContent = getTrans('intro1');
          intros[1].textContent = getTrans('intro2');
          intros[2].textContent = getTrans('intro3');
        }
        document.getElementById('viewPriceText').textContent = getTrans('viewPrice');
        document.getElementById('copyrightText').textContent = getTrans('copyright');
        document.getElementById('priceListTitle').textContent = getTrans('priceTitle');
        document.getElementById('backText').textContent = getTrans('back');
        renderPriceCards();
      }

      function renderPriceCards() {
        const container = document.getElementById('priceContentContainer');
        let items = productData.filter(p => p.series === currentCategory);
        const seriesKey = currentCategory==='iphone'?'iphoneSeries':(currentCategory==='samsung'?'samsungSeries':'pixelSeries');
        let html = `<div class="series-section"><h3 class="text-xl font-bold mb-4">${getTrans(seriesKey)}</h3><div class="card-grid">`;
        items.forEach(item => {
          const desc = getTrans(item.descKey);
          const badges = item.storage.map((s,i) => `<span class="bg-gray-100 px-2 py-1 rounded-lg text-xs font-medium">${s} <strong>$${item.prices[i].toFixed(2)}</strong></span>`).join('');
          html += `<div class="price-card" data-product-index="${productData.indexOf(item)}">
            <h4 class="text-lg font-bold">${item.name}</h4><p class="text-xs text-gray-400 mb-2">${desc}</p>
            <div class="flex flex-wrap gap-2">${badges}</div></div>`;
        });
        html += `</div></div>`;
        container.innerHTML = html;
        document.querySelectorAll('.price-card').forEach(card => {
          card.addEventListener('click', function(){
            const idx = parseInt(this.dataset.productIndex);
            openProductModal(productData[idx]);
          });
        });
      }

      function openProductModal(product) {
        currentProduct = product;
        let selectedStorage = 0, selectedColor = 0;
        const render = () => {
          const lang = translations[currentLang] || translations.en;
          document.getElementById('modalContent').innerHTML = `
            <div class="flex justify-between items-start mb-4">
              <h3 class="text-xl font-bold">${product.name}</h3>
              <button id="closeProductModal" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <p class="text-gray-500 text-sm mb-4">${lang[product.descKey] || ''}</p>
            <div class="mb-4"><span class="text-sm font-medium">${getTrans('storageLabel')}:</span>
              <div class="flex gap-2 mt-2">${product.storage.map((s,i) => `<button class="storage-opt px-3 py-1.5 rounded-full text-sm font-medium ${i===selectedStorage?'bg-black text-white':'bg-gray-100'}" data-idx="${i}">${s}</button>`).join('')}</div>
            </div>
            <div class="mb-4"><span class="text-sm font-medium">${getTrans('colorLabel')}:</span>
              <div class="flex gap-2 mt-2 items-center">${product.colors.map((c,i) => `<span class="color-dot ${i===selectedColor?'selected':''}" style="background:${c}" data-cidx="${i}" title="${product.colorNames[i]}"></span>`).join('')}<span class="text-xs text-gray-500 ml-2">${product.colorNames[selectedColor]}</span></div>
            </div>
            <div class="text-2xl font-bold my-4">$${product.prices[selectedStorage].toFixed(2)}</div>
            <button id="goToAddressBtn" class="w-full py-3 bg-black text-white rounded-full font-semibold">${getTrans('proceedToAddress')}</button>
          `;
          document.getElementById('closeProductModal').addEventListener('click', ()=> productModal.classList.remove('active'));
          document.querySelectorAll('.storage-opt').forEach(b => b.addEventListener('click', function(){
            selectedStorage = parseInt(this.dataset.idx); render();
          }));
          document.querySelectorAll('.color-dot').forEach(d => d.addEventListener('click', function(){
            selectedColor = parseInt(this.dataset.cidx); render();
          }));
          document.getElementById('goToAddressBtn').addEventListener('click', ()=>{
            currentProductPrice = product.prices[selectedStorage];
            productModal.classList.remove('active');
            openAddressModal();
          });
        };
        render();
        productModal.classList.add('active');
      }

      function openAddressModal(prefill = {}) {
        document.getElementById('addressModalContent').innerHTML = `
          <div class="flex justify-between items-start mb-4">
            <h3 class="text-xl font-bold">${getTrans('shippingTitle')}</h3>
            <button id="closeAddressModal" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
          </div>
          <div class="space-y-3">
            <input id="addrName" type="text" placeholder="${getTrans('fullName')}" value="${prefill.name || ''}" class="w-full p-3 border rounded-xl">
            <input id="addrPhone" type="tel" placeholder="${getTrans('phone')}" value="${prefill.phone || ''}" class="w-full p-3 border rounded-xl">
            <input id="addrEmail" type="email" placeholder="${getTrans('email')}" value="${prefill.email || ''}" class="w-full p-3 border rounded-xl">
            <textarea id="addrAddress" placeholder="${getTrans('address')}" rows="2" class="w-full p-3 border rounded-xl">${prefill.address || ''}</textarea>
            <label class="flex items-center gap-2 text-sm text-gray-600"><input type="checkbox" id="saveAddressCheck" checked> ${getTrans('saveAddress')}</label>
          </div>
          <div class="flex gap-3 mt-4">
            <button id="chooseFromBookBtn" class="flex-1 py-2.5 border rounded-full font-medium">${getTrans('fromAddressBook')}</button>
            <button id="confirmAddressBtn" class="flex-1 py-2.5 bg-black text-white rounded-full font-semibold">${getTrans('confirmAndPay')}</button>
          </div>
        `;
        document.getElementById('closeAddressModal').addEventListener('click', ()=> addressModal.classList.remove('active'));
        document.getElementById('chooseFromBookBtn').addEventListener('click', ()=>{
          openAddressBookModal(true);
        });
        document.getElementById('confirmAddressBtn').addEventListener('click', ()=>{
          const addr = {
            name: document.getElementById('addrName').value.trim(),
            phone: document.getElementById('addrPhone').value.trim(),
            email: document.getElementById('addrEmail').value.trim(),
            address: document.getElementById('addrAddress').value.trim()
          };
          if(!addr.name || !addr.phone || !addr.address){ alert('Please fill all required fields.'); return; }
          if(document.getElementById('saveAddressCheck').checked){
            let addresses = getSavedAddresses();
            addresses.unshift({...addr, id: Date.now()});
            saveAddresses(addresses);
          }
          addressModal.classList.remove('active');
          openPaymentModal(currentProductPrice);
        });
        addressModal.classList.add('active');
      }

      function openAddressBookModal(forSelection = false) {
        const addresses = getSavedAddresses();
        let html = `<div class="flex justify-between items-start mb-4"><h3 class="text-xl font-bold">${getTrans('addressBookTitle')}</h3><button id="closeAddressBook" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button></div>`;
        if(addresses.length === 0){
          html += `<p class="text-gray-500 text-center py-4">${getTrans('noSavedAddress')}</p>`;
        } else {
          addresses.forEach((addr, idx) => {
            html += `<div class="saved-address-item">
              <p class="font-semibold">${addr.name}</p><p class="text-sm text-gray-500">${addr.phone} | ${addr.email}</p><p class="text-sm text-gray-400">${addr.address}</p>
              ${forSelection ? `<button class="text-sm text-blue-600 select-addr mt-1" data-idx="${idx}">${getTrans('selectAddress')}</button>` : ''}
              <button class="text-sm text-red-500 delete-addr ml-2" data-id="${addr.id}">${getTrans('deleteAddress')}</button>
            </div>`;
          });
        }
        if(!forSelection){
          html += `<button id="addNewAddressBtn" class="w-full py-2.5 bg-black text-white rounded-full mt-4">${getTrans('addNewAddress')}</button>`;
        }
        document.getElementById('addressBookContent').innerHTML = html;
        document.getElementById('closeAddressBook').addEventListener('click', ()=> addressBookModal.classList.remove('active'));
        if(!forSelection){
          document.getElementById('addNewAddressBtn')?.addEventListener('click', ()=>{
            addressBookModal.classList.remove('active');
            openAddressModal();
          });
        }
        document.querySelectorAll('.delete-addr').forEach(btn => {
          btn.addEventListener('click', function(e){
            e.stopPropagation();
            const id = this.dataset.id;
            let addresses = getSavedAddresses().filter(a => a.id != id);
            saveAddresses(addresses);
            openAddressBookModal(forSelection); // refresh
          });
        });
        if(forSelection){
          document.querySelectorAll('.select-addr').forEach(btn => {
            btn.addEventListener('click', function(){
              const idx = parseInt(this.dataset.idx);
              const addr = getSavedAddresses()[idx];
              addressBookModal.classList.remove('active');
              openAddressModal(addr);
            });
          });
        }
        addressBookModal.classList.add('active');
      }

      function openPaymentModal(price) {
        const discountPrice = price * 0.9;
        let receiptFile = null;
        const renderPayment = () => {
          document.getElementById('paymentModalContent').innerHTML = `
            <div class="flex justify-between items-start mb-4">
              <h3 class="text-xl font-bold">${getTrans('paymentTitle')}</h3>
              <button id="closePaymentModal" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <div class="payment-option">
              <h3>${getTrans('usdtTitle')}</h3>
              <p class="text-sm">${getTrans('usdtPriceLabel')} <strong>${discountPrice.toFixed(2)} USDT</strong></p>
              <p class="text-sm mt-2">${getTrans('usdtAddressLabel')}</p>
              <p class="address-text">TP1HgMuwTkYDbiALMeCie9gY2hGBWfrfky</p>
              <p class="text-xs text-gray-400 mt-1">${getTrans('usdtNote')}</p>
            </div>
            <div class="mb-4">
              <p class="text-sm font-medium mb-1">${getTrans('uploadReceipt')}</p>
              <div class="upload-area" id="receiptUploadArea">
                <i class="fas fa-cloud-upload-alt text-2xl text-gray-400 mb-2"></i>
                <p class="text-sm text-gray-500">${getTrans('uploadHint')}</p>
                <input type="file" id="receiptFileInput" accept="image/*" class="hidden">
                <img id="receiptPreview" class="upload-preview" style="display:none;">
                <p id="uploadStatus" class="text-xs text-green-600 mt-1 hidden">${getTrans('receiptUploaded')}</p>
              </div>
            </div>
            <button id="confirmPaymentBtn" class="w-full py-3 bg-green-500 text-white rounded-full font-semibold">${getTrans('confirmPayment')}</button>
          `;
          document.getElementById('closePaymentModal').addEventListener('click', ()=> paymentModal.classList.remove('active'));
          const uploadArea = document.getElementById('receiptUploadArea');
          const fileInput = document.getElementById('receiptFileInput');
          uploadArea.addEventListener('click', ()=> fileInput.click());
          fileInput.addEventListener('change', function(e){
            const file = e.target.files[0];
            if(file){
              receiptFile = file;
              const reader = new FileReader();
              reader.onload = function(ev){
                document.getElementById('receiptPreview').src = ev.target.result;
                document.getElementById('receiptPreview').style.display = 'block';
                document.getElementById('uploadStatus').classList.remove('hidden');
              };
              reader.readAsDataURL(file);
            }
          });
          document.getElementById('confirmPaymentBtn').addEventListener('click', ()=>{
            if(!receiptFile){ alert('Please upload receipt first.'); return; }
            alert(getTrans('orderSuccess'));
            paymentModal.classList.remove('active');
          });
        };
        renderPayment();
        paymentModal.classList.add('active');
      }

      // 地址本按钮（价格表页导航栏）
      document.getElementById('openAddressBookBtn').addEventListener('click', ()=> openAddressBookModal(false));

      function slideToPage(index) {
        if(index === 0){
          slider.style.transform = 'translateX(0)';
          page1Content.classList.remove('shifted');
          page2Content.classList.remove('entered');
        } else {
          slider.style.transform = 'translateX(-50%)';
          page1Content.classList.add('shifted');
          page2Content.classList.add('entered');
        }
      }

      let touchStartX = 0;
      slider.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, {passive:true});
      slider.addEventListener('touchend', e => {
        const diff = touchStartX - e.changedTouches[0].screenX;
        if(Math.abs(diff)>50){
          const isPage1 = slider.style.transform.includes('0');
          if(diff>0 && isPage1) slideToPage(1);
          else if(diff<0 && !isPage1) slideToPage(0);
        }
      });

      document.getElementById('goToPriceBtn').addEventListener('click', ()=> slideToPage(1));
      document.getElementById('backToHomeBtn').addEventListener('click', ()=> slideToPage(0));
      document.getElementById('categoryTabs').addEventListener('click', e => {
        if(e.target.classList.contains('category-tab')){
          document.querySelectorAll('.category-tab').forEach(t=>{t.classList.remove('active','bg-black','text-white'); t.classList.add('bg-white','border');});
          e.target.classList.add('active','bg-black','text-white'); e.target.classList.remove('bg-white','border');
          currentCategory = e.target.dataset.category;
          renderPriceCards();
        }
      });
      document.getElementById('languageSelect').addEventListener('change', e => {
        currentLang = e.target.value;
        updateAllTexts();
      });

      // 关闭弹窗（点击背景）
      [productModal, addressModal, addressBookModal, paymentModal].forEach(m => {
        m.addEventListener('click', function(e){ if(e.target === m) m.classList.remove('active'); });
      });

      pricePage.addEventListener('scroll', ()=> backToTopBtn.classList.toggle('visible', pricePage.scrollTop > 400));
      backToTopBtn.addEventListener('click', ()=> pricePage.scrollTo({top:0, behavior:'smooth'}));

      updateAllTexts();
      slider.style.transform = 'translateX(0)';
    })();
  </script>
</body>
</html>
