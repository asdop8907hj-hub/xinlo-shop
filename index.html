<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>BINPG • 渠道导航</title>
  <meta name="description" content="BINPG 官方社交渠道导航">
  <meta name="theme-color" content="#0a0a0a">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }

    /* 背景光晕 */
    body::before {
      content: '';
      position: fixed;
      top: -40%;
      left: -20%;
      width: 80%;
      height: 100%;
      background: radial-gradient(circle at 50% 40%, rgba(100, 120, 255, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: bgGlow 8s ease-in-out infinite alternate;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -30%;
      right: -15%;
      width: 70%;
      height: 90%;
      background: radial-gradient(circle at 60% 70%, rgba(255, 150, 80, 0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: bgGlow 10s ease-in-out infinite alternate-reverse;
    }

    @keyframes bgGlow {
      0% {
        opacity: 0.4;
        transform: scale(1);
      }
      100% {
        opacity: 0.8;
        transform: scale(1.05);
      }
    }

    /* 主容器 */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    /* Logo 区域 */
    .logo {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #6e8efb, #a777e3, #f8a5c2);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: logoShine 4s ease-in-out infinite;
    }

    @keyframes logoShine {
      0%,
      100% {
        background-position: 0% center;
      }
      50% {
        background-position: 100% center;
      }
    }

    .subtitle {
      font-size: 0.85rem;
      color: #666;
      font-weight: 400;
      letter-spacing: 0.04em;
      margin-bottom: 2.5rem;
    }

    /* 按钮列表 */
    .btn-list {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    /* 单个按钮 */
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      padding: 0.95rem 1.5rem;
      border-radius: 3rem;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1.2);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.02em;
    }

    /* 悬停光效 */
    .social-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      transform: translate(-50%, -50%);
      transition: width 0.5s ease, height 0.5s ease;
    }

    .social-btn:hover::before {
      width: 400px;
      height: 400px;
    }

    .social-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }

    .social-btn:active {
      transform: scale(0.97);
      transition: transform 0.1s ease;
    }

    .social-btn i {
      font-size: 1.3rem;
      width: 28px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .social-btn span {
      position: relative;
      z-index: 1;
      flex: 1;
      text-align: left;
    }

    .social-btn .arrow {
      opacity: 0;
      transform: translateX(-8px);
      transition: all 0.3s ease;
      font-size: 0.85rem;
    }

    .social-btn:hover .arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* 各平台专属颜色 */
    .btn-x {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.12);
    }
    .btn-x:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .btn-ins {
      background: rgba(225, 48, 108, 0.08);
      border-color: rgba(225, 48, 108, 0.2);
    }
    .btn-ins:hover {
      background: rgba(225, 48, 108, 0.15);
      border-color: rgba(225, 48, 108, 0.4);
    }
    .btn-ins i {
      color: #e1306c;
    }

    .btn-fb {
      background: rgba(24, 119, 242, 0.08);
      border-color: rgba(24, 119, 242, 0.2);
    }
    .btn-fb:hover {
      background: rgba(24, 119, 242, 0.15);
      border-color: rgba(24, 119, 242, 0.4);
    }
    .btn-fb i {
      color: #1877f2;
    }

    .btn-tg-main {
      background: rgba(0, 136, 204, 0.08);
      border-color: rgba(0, 136, 204, 0.2);
    }
    .btn-tg-main:hover {
      background: rgba(0, 136, 204, 0.15);
      border-color: rgba(0, 136, 204, 0.4);
    }
    .btn-tg-main i {
      color: #0088cc;
    }

    .btn-tg-ad {
      background: rgba(255, 107, 53, 0.08);
      border-color: rgba(255, 107, 53, 0.2);
    }
    .btn-tg-ad:hover {
      background: rgba(255, 107, 53, 0.15);
      border-color: rgba(255, 107, 53, 0.4);
    }
    .btn-tg-ad i {
      color: #ff6b35;
    }

    /* 页脚 */
    .footer {
      margin-top: 2.5rem;
      font-size: 0.7rem;
      color: #444;
      letter-spacing: 0.03em;
    }

    /* 响应式 */
    @media (max-width: 480px) {
      .container {
        max-width: 100%;
      }

      .logo {
        font-size: 2.5rem;
      }

      .social-btn {
        padding: 0.85rem 1.2rem;
        font-size: 0.95rem;
      }

      .social-btn i {
        font-size: 1.15rem;
        width: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo -->
    <div class="logo">BINPG</div>
    <p class="subtitle">OFFICIAL CHANNELS</p>

    <!-- 按钮列表 -->
    <div class="btn-list">
      <!-- X (Twitter) -->
      <a href="https://x.com/binpg_x" target="_blank" rel="noopener noreferrer" class="social-btn btn-x">
        <i class="fab fa-x-twitter"></i>
        <span>X (Twitter)</span>
        <i class="fas fa-arrow-right arrow"></i>
      </a>

      <!-- Instagram -->
      <a href="https://instagram.com/binpg_ins" target="_blank" rel="noopener noreferrer" class="social-btn btn-ins">
        <i class="fab fa-instagram"></i>
        <span>Instagram</span>
        <i class="fas fa-arrow-right arrow"></i>
      </a>

      <!-- Facebook -->
      <a href="https://facebook.com/binpgfb" target="_blank" rel="noopener noreferrer" class="social-btn btn-fb">
        <i class="fab fa-facebook-f"></i>
        <span>Facebook</span>
        <i class="fas fa-arrow-right arrow"></i>
      </a>

      <!-- Telegram 主频道 -->
      <a href="https://t.me/binpg" target="_blank" rel="noopener noreferrer" class="social-btn btn-tg-main">
        <i class="fab fa-telegram-plane"></i>
        <span>Telegram 主频道</span>
        <i class="fas fa-arrow-right arrow"></i>
      </a>

      <!-- 广告投放 -->
      <a href="https://t.me/ooesebot" target="_blank" rel="noopener noreferrer" class="social-btn btn-tg-ad">
        <i class="fas fa-bullhorn"></i>
        <span>广告投放</span>
        <i class="fas fa-arrow-right arrow"></i>
      </a>
    </div>

    <!-- 页脚 -->
    <div class="footer">© 2025 BINPG. All rights reserved.</div>
  </div>

  <!-- Font Awesome 6 CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
</body>
</html>
