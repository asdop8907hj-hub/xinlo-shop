    body::before {
      content: ''; position: fixed; top: -30%; right: -20%; width: 70%; height: 80%;

      pointer-events: none; z-index: 0; animation: bgGlow 12s ease-in-out infinite alternate;
    }
    body::after {
      content: ''; position: fixed; bottom: -20%; left: -15%; width: 60%; height: 70%;
      background: radial-gradient(circle at 30% 70%, rgba(255,180,100,0.03) 0%, transparent 60%);
      pointer-events: none; z-index: 0; animation: bgGlow 15s ease-in-out infinite alternate-reverse;

    .page::-webkit-scrollbar-track { background: transparent; }
    .page::-webkit-scrollbar-thumb { background-color: #d0d0d0; border-radius: 10px; }
    @keyframes dropIn {

      80% { transform: translateY(-4px); }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes rainbowFlow {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }

    @keyframes fadeInUp {

      to { opacity: 1; transform: translateY(0); }

    }
    .rainbow-text-static {

      background-size: 150% auto; -webkit-background-clip: text; background-clip: text; color: transparent;

        { series:'samsung', name:'Galaxy S24 Ultra', storage:['256GB','512GB','1TB'], descKey:'s24UltraDesc', prices:[518.60, 601.00, 689.80], colors:['#1d1d1f','#c0c0c0','#4a6fa5','#e8d5b7'], colorNames:['Titanium Black','Titanium Silver','Titanium Violet','Titanium Yellow'] },

        // Samsung Galaxy S25 系列（同年参考二手）
        { series:'samsung', name:'Galaxy S25', storage:['128GB','256GB'], descKey:'s25Desc', prices:[359.00, 399.00], colors:['#1d1d1f','#c0c0c0','#4a6fa5','#e8d5b7'], colorNames:['Phantom Black','Silver','Cobalt Violet','Amber Yellow'] },
        { series:'samsung', name:'Galaxy S25+', storage:['256GB','512GB'], descKey:'s25PlusDesc', prices:[459.00, 519.00], colors:['#1d1d1f','#c0c0c0','#4a6fa5','#e8d5b7'], colorNames:['Phantom Black','Silver','Cobalt Violet','Amber Yellow'] },
        { series:'samsung', name:'Galaxy S25 Ultra', storage:['256GB','512GB','1TB'], descKey:'s25UltraDesc', prices:[599.00, 679.00, 779.00], colors:['#1d1d1f','#c0c0c0','#4a6fa5','#e8d5b7'], colorNames:['Titanium Black','Titanium Silver','Titanium Violet','Titanium Yellow'] },

        // Samsung Galaxy Z 系列（二手 -8%）
        { series:'samsung', name:'Galaxy Z Flip 6', storage:['256GB','512GB'], descKey:'zFlip6Desc', prices:[473.20, 518.60], colors:['#1d1d1f','#c0c0c0','#4a6fa5','#e8d5b7'], colorNames:['Phantom Black','Silver','Blue','Yellow'] },
        { series:'samsung', name:'Galaxy Z Fold 6', storage:['256GB','512GB','1TB'], descKey:'zFold6Desc', prices:[899.00, 979.00, 1099.00], colors:['#1d1d1f','#c0c0c0','#4a6fa5'], colorNames:['Phantom Black','Silver','Blue'] },

        // Google Pixel 8 系列（二手 -8%）
        { series:'pixel', name:'Pixel 8', storage:['128GB','256GB'], descKey:'pixel8Desc', prices:[257.60, 294.40], colors:['#1d1d1f','#f5f5f0','#bfa08a'], colorNames:['Obsidian','Porcelain','Hazel'] },
        { series:'pixel', name:'Pixel 8 Pro', storage:['128GB','256GB','512GB'], descKey:'pixel8ProDesc', prices:[370.00, 420.00, 490.00], colors:['#1d1d1f','#f5f5f0','#bfa08a'], colorNames:['Obsidian','Porcelain','Hazel'] },

        // Google Pixel 9 系列（同年参考二手）
        { series:'pixel', name:'Pixel 9', storage:['128GB','256GB'], descKey:'pixel9Desc', prices:[349.00, 399.00], colors:['#1d1d1f','#f5f5f0','#bfa08a','#5f9ea0'], colorNames:['Obsidian','Porcelain','Hazel','Bay'] },
        { series:'pixel', name:'Pixel 9 Pro', storage:['128GB','256GB','512GB'], descKey:'pixel9ProDesc', prices:[449.00, 519.00, 599.00], colors:['#1d1d1f','#f5f5f0','#bfa08a','#5f9ea0'], colorNames:['Obsidian','Porcelain','Hazel','Bay'] },
        { series:'pixel', name:'Pixel 9 Pro XL', storage:['128GB','256GB','512GB','1TB'], descKey:'pixel9ProXLDesc', prices:[549.00, 619.00, 699.00, 799.00], colors:['#1d1d1f','#f5f5f0','#bfa08a','#5f9ea0'], colorNames:['Obsidian','Porcelain','Hazel','Bay'] }
      ];

      const slider = document.getElementById('pageSlider');
      const page1Content = document.getElementById('page1Content');
      const page2Content = document.getElementById('page2Content');
      const pricePage = document.getElementById('pricePage');
      const backToTopBtn = document.getElementById('backToTop');
      const productModal = document.getElementById('productModal');
      const addressModal = document.getElementById('addressModal');
      const addressBookModal = document.getElementById('addressBookModal');
      const paymentModal = document.getElementById('paymentModal');
      const orderConfirmModal = document.getElementById('orderConfirmModal');
      const userCenterBtn = document.getElementById('userCenterBtn');
      const userCenterModal = document.getElementById('userCenterModal');
      const mainLogo = document.getElementById('mainLogo');

      let currentLang = 'en';
      let currentCategory = 'iphone';
      let currentProduct = null;
      let currentProductPrice = 0;
      let currentAddress = null;
      let selectedStorageIndex = 0;
      let selectedColorIndex = 0;
      let selectedQuantity = 1;

      function t(key) { return (translations[currentLang] && translations[currentLang][key]) || translations.en[key] || key; }

      function getSavedAddresses() { try { return JSON.parse(localStorage.getItem('xinlo_addresses') || '[]'); } catch(e) { return []; } }
      function saveAddresses(arr) { localStorage.setItem('xinlo_addresses', JSON.stringify(arr)); }
      function getOrders() { try { return JSON.parse(localStorage.getItem('xinlo_orders') || '[]'); } catch(e) { return []; } }
      function saveOrders(arr) { localStorage.setItem('xinlo_orders', JSON.stringify(arr)); }

      function updateAllTexts() {
        document.getElementById('subTagline').textContent = t('tagline');
        const intros = document.querySelectorAll('#introText p');
        if(intros.length>=3){ intros[0].textContent = t('intro1'); intros[1].textContent = t('intro2'); intros[2].textContent = t('intro3'); }
        document.getElementById('viewPriceText').textContent = t('viewPrice');
        document.getElementById('copyrightText').textContent = t('copyright');
        document.getElementById('priceListTitle').textContent = t('priceTitle');
        document.getElementById('backText').textContent = t('back');
        renderPriceCards();
      }

      function renderPriceCards() {
        const container = document.getElementById('priceContentContainer');
        let items = productData.filter(p => p.series === currentCategory);
        const seriesKey = currentCategory==='iphone'?'iphoneSeries':(currentCategory==='samsung'?'samsungSeries':'pixelSeries');
        let html = `<div class="series-section"><h3 class="text-xl font-bold mb-4">${t(seriesKey)}</h3><div class="card-grid">`;
        items.forEach(item => {
          const desc = t(item.descKey);
          const badges = item.storage.map((s,i) => `<span class="bg-gray-100 px-2 py-1 rounded-lg text-xs font-medium">${s} <strong>$${item.prices[i].toFixed(2)}</strong></span>`).join('');
          html += `<div class="price-card" data-product-index="${productData.indexOf(item)}"><h4 class="text-lg font-bold">${item.name}</h4><p class="text-xs text-gray-400 mb-2">${desc}</p><div class="flex flex-wrap gap-2">${badges}</div></div>`;
        });
        html += `</div></div>`;
        container.innerHTML = html;
        document.querySelectorAll('.price-card').forEach(card => card.addEventListener('click', function(){ openProductModal(productData[parseInt(this.dataset.productIndex)]); }));
      }

      function openProductModal(product) {
        currentProduct = product;
        selectedStorageIndex = 0;
        selectedColorIndex = 0;
        selectedQuantity = 1;
        const render = () => {
          const total = product.prices[selectedStorageIndex] * selectedQuantity;
          document.getElementById('modalContent').innerHTML = `
            <div class="flex justify-between items-start mb-4"><h3 class="text-xl font-bold">${product.name}</h3><button id="closeProductModal" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button></div>
            <p class="text-gray-500 text-sm mb-4">${(translations[currentLang]||translations.en)[product.descKey]}</p>
            <div class="mb-4"><span class="text-sm font-medium">${t('storageLabel')}:</span><div class="flex gap-2 mt-2">${product.storage.map((s,i)=>`<button class="storage-opt px-3 py-1.5 rounded-full text-sm font-medium ${i===selectedStorageIndex?'bg-black text-white':'bg-gray-100'}" data-idx="${i}">${s}</button>`).join('')}</div></div>
            <div class="mb-4"><span class="text-sm font-medium">${t('colorLabel')}:</span><div class="flex gap-2 mt-2 items-center">${product.colors.map((c,i)=>`<span class="color-dot ${i===selectedColorIndex?'selected':''}" style="background:${c}" data-cidx="${i}" title="${product.colorNames[i]}"></span>`).join('')}<span class="text-xs text-gray-500 ml-2">${product.colorNames[selectedColorIndex]}</span></div></div>
            <div class="mb-4"><span class="text-sm font-medium">${t('quantityLabel')}:</span><div class="flex items-center gap-2 mt-2"><button class="quantity-btn" id="qtyMinus">−</button><input type="number" id="qtyInput" class="quantity-input" value="${selectedQuantity}" min="1" max="10"><button class="quantity-btn" id="qtyPlus">+</button></div></div>
            <div class="text-2xl font-bold my-4">$${total.toFixed(2)}</div>
            <button id="goToAddressBtn" class="w-full py-3 bg-black text-white rounded-full font-semibold">${t('proceedToAddress')}</button>`;
          document.getElementById('closeProductModal').addEventListener('click', ()=> productModal.classList.remove('active'));
          document.querySelectorAll('.storage-opt').forEach(b=>b.addEventListener('click', function(){ selectedStorageIndex=parseInt(this.dataset.idx); render(); }));
          document.querySelectorAll('.color-dot').forEach(d=>d.addEventListener('click', function(){ selectedColorIndex=parseInt(this.dataset.cidx); render(); }));
          document.getElementById('qtyMinus').addEventListener('click', ()=>{ if(selectedQuantity>1){ selectedQuantity--; document.getElementById('qtyInput').value=selectedQuantity; render(); } });
          document.getElementById('qtyPlus').addEventListener('click', ()=>{ if(selectedQuantity<10){ selectedQuantity++; document.getElementById('qtyInput').value=selectedQuantity; render(); } });
          document.getElementById('qtyInput').addEventListener('change', function(){ let v = parseInt(this.value); if(v>=1 && v<=10){ selectedQuantity=v; render(); } else { this.value=selectedQuantity; } });
          document.getElementById('goToAddressBtn').addEventListener('click', ()=>{ currentProductPrice = currentProduct.prices[selectedStorageIndex] * selectedQuantity; productModal.classList.remove('active'); openAddressModal(); });
        };
        render(); productModal.classList.add('active');
      }

      function openAddressModal(prefill={}) {
        document.getElementById('addressModalContent').innerHTML = `
          <div class="flex justify-between items-start mb-4"><h3 class="text-xl font-bold">${t('shippingTitle')}</h3><button id="closeAddressModal" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button></div>
          <input id="addrName" placeholder="${t('fullName')}" value="${prefill.name||''}" class="w-full p-3 border rounded-xl mb-2">
          <input id="addrPhone" placeholder="${t('phone')}" value="${prefill.phone||''}" class="w-full p-3 border rounded-xl mb-2">
          <input id="addrEmail" placeholder="${t('email')}" value="${prefill.email||''}" class="w-full p-3 border rounded-xl mb-2">
          <textarea id="addrAddress" placeholder="${t('address')}" rows="2" class="w-full p-3 border rounded-xl mb-2">${prefill.address||''}</textarea>
          <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="saveAddressCheck" checked> ${t('saveAddress')}</label>
          <div class="flex gap-3 mt-4"><button id="chooseFromBookBtn" class="flex-1 py-2.5 border rounded-full">${t('fromAddressBook')}</button><button id="confirmAddressBtn" class="flex-1 py-2.5 bg-black text-white rounded-full">${t('confirmAndPay')}</button></div>`;
        document.getElementById('closeAddressModal').addEventListener('click', ()=> addressModal.classList.remove('active'));
        document.getElementById('chooseFromBookBtn').addEventListener('click', ()=>{ openAddressBookModal(true); });
        document.getElementById('confirmAddressBtn').addEventListener('click', ()=>{
          const addr = { name:document.getElementById('addrName').value.trim(), phone:document.getElementById('addrPhone').value.trim(), email:document.getElementById('addrEmail').value.trim(), address:document.getElementById('addrAddress').value.trim() };
          if(!addr.name||!addr.phone||!addr.address){ alert('Fill required fields'); return; }
          if(document.getElementById('saveAddressCheck').checked){ let list=getSavedAddresses(); list.unshift({...addr,id:Date.now()}); saveAddresses(list); }
          currentAddress=addr; addressModal.classList.remove('active'); openPaymentModal();
        });
        addressModal.classList.add('active');
      }

      function openAddressBookModal(forSelection=false) {
        const addresses = getSavedAddresses();
        let html = `<div class="flex justify-between items-start mb-4"><h3 class="text-xl font-bold">${t('addressBookTitle')}</h3><button id="closeAddressBook" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button></div>`;
        if(addresses.length===0) html+=`<p class="text-gray-500 text-center py-4">${t('noSavedAddress')}</p>`;
        else addresses.forEach((addr,idx)=>{ html+=`<div class="saved-address-item"><p class="font-semibold">${addr.name}</p><p class="text-sm text-gray-500">${addr.phone} | ${addr.email}</p><p class="text-sm text-gray-400">${addr.address}</p>${forSelection?`<button class="text-sm text-blue-600 select-addr mt-1" data-idx="${idx}">${t('selectAddress')}</button>`:''}<button class="text-sm text-red-500 delete-addr ml-2" data-id="${addr.id}">${t('deleteAddress')}</button></div>`; });
        if(!forSelection) html+=`<button id="addNewAddressBtn" class="w-full py-2.5 bg-black text-white rounded-full mt-4">${t('addNewAddress')}</button>`;
        document.getElementById('addressBookContent').innerHTML=html;
        document.getElementById('closeAddressBook').addEventListener('click', ()=> addressBookModal.classList.remove('active'));
        if(!forSelection) document.getElementById('addNewAddressBtn')?.addEventListener('click', ()=>{ addressBookModal.classList.remove('active'); openAddressModal(); });
        document.querySelectorAll('.delete-addr').forEach(b=>b.addEventListener('click', function(e){ e.stopPropagation(); saveAddresses(getSavedAddresses().filter(a=>a.id!=this.dataset.id)); openAddressBookModal(forSelection); }));
        if(forSelection) document.querySelectorAll('.select-addr').forEach(b=>b.addEventListener('click', function(){ const addr=getSavedAddresses()[parseInt(this.dataset.idx)]; addressBookModal.classList.remove('active'); openAddressModal(addr); }));
        addressBookModal.classList.add('active');
      }

      function openPaymentModal() {
        const discountPrice = currentProductPrice * 0.9;
        let receiptFile = null;
        const render = () => {
          document.getElementById('paymentModalContent').innerHTML = `
            <div class="flex justify-between items-start mb-4"><h3 class="text-xl font-bold">${t('paymentTitle')}</h3><button id="closePaymentModal" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button></div>
            <div class="payment-option"><h3>${t('usdtTitle')}</h3><p class="text-sm">${t('usdtPriceLabel')} <strong>${discountPrice.toFixed(2)} USDT</strong></p><p class="text-sm mt-2">${t('usdtAddressLabel')}</p><p class="address-text">TP1HgMuwTkYDbiALMeCie9gY2hGBWfrfky</p><p class="text-xs text-gray-400 mt-1">${t('usdtNote')}</p></div>
            <div class="mb-4"><p class="text-sm font-medium mb-1">${t('uploadReceipt')}</p><div class="upload-area" id="receiptUploadArea"><i class="fas fa-cloud-upload-alt text-2xl text-gray-400 mb-2"></i><p class="text-sm text-gray-500">${t('uploadHint')}</p><input type="file" id="receiptFileInput" accept="image/*" class="hidden"><img id="receiptPreview" class="upload-preview" style="display:none;"><p id="uploadStatus" class="text-xs text-green-600 mt-1 hidden">${t('receiptUploaded')}</p></div></div>
            <button id="confirmPaymentBtn" class="w-full py-3 bg-green-500 text-white rounded-full font-semibold">${t('confirmPayment')}</button>`;
          document.getElementById('closePaymentModal').addEventListener('click', ()=> paymentModal.classList.remove('active'));
          document.getElementById('receiptUploadArea').addEventListener('click', ()=> document.getElementById('receiptFileInput').click());
          document.getElementById('receiptFileInput').addEventListener('change', function(e){
            const file=e.target.files[0]; if(file){ receiptFile=file; const reader=new FileReader(); reader.onload=function(ev){ document.getElementById('receiptPreview').src=ev.target.result; document.getElementById('receiptPreview').style.display='block'; document.getElementById('uploadStatus').classList.remove('hidden'); }; reader.readAsDataURL(file); }
          });
          document.getElementById('confirmPaymentBtn').addEventListener('click', ()=>{
            if(!receiptFile){ alert('Please upload receipt'); return; }
            const order = {
              id: Date.now(),
              product: currentProduct.name,
              storage: currentProduct.storage[selectedStorageIndex],
              color: currentProduct.colorNames[selectedColorIndex],
              quantity: selectedQuantity,
              price: currentProductPrice,
              discount: discountPrice,
              address: currentAddress,
              time: new Date().toISOString(),
              status: 'pending'
            };
            let orders = getOrders(); orders.unshift(order); saveOrders(orders);
            paymentModal.classList.remove('active');
            openOrderConfirmModal();
          });
        };
        render(); paymentModal.classList.add('active');
      }

      function openOrderConfirmModal() {
        const discountPrice = currentProductPrice * 0.9;
        const now = new Date().toLocaleString();
        document.getElementById('orderConfirmContent').innerHTML = `
          <div class="text-center mb-4"><i class="fas fa-check-circle text-green-500 text-4xl"></i><h3 class="text-xl font-bold mt-2">${t('orderSuccessTitle')}</h3></div>
          <div class="bg-gray-50 rounded-xl p-4 mb-4"><h4 class="font-semibold mb-2">${t('orderSummary')}</h4><div class="order-summary-line"><span>${t('productLabel')}:</span><strong>${currentProduct.name}</strong></div><div class="order-summary-line"><span>${t('storageOption')}:</span>${currentProduct.storage[selectedStorageIndex]}</div><div class="order-summary-line"><span>${t('colorOption')}:</span>${currentProduct.colorNames[selectedColorIndex]}</div><div class="order-summary-line"><span>${t('quantityLabel')}:</span>${selectedQuantity}</div><div class="order-summary-line"><span>${t('originalPrice')}:</span>$${currentProductPrice.toFixed(2)}</div><div class="order-summary-line"><span>${t('discountPrice')}:</span><strong>${discountPrice.toFixed(2)} USDT</strong></div></div>
          <div class="bg-gray-50 rounded-xl p-4 mb-4"><h4 class="font-semibold mb-2">${t('shippingInfo')}</h4><p><strong>${currentAddress.name}</strong></p><p>${currentAddress.phone} | ${currentAddress.email}</p><p>${currentAddress.address}</p></div>
          <p class="text-xs text-gray-500 mb-2">${t('paymentTime')}: ${now}</p><p class="text-sm text-gray-600 mb-4">${t('thankYou')}</p>
          <div class="flex gap-3"><button id="closeOrderConfirm" class="flex-1 py-2.5 border rounded-full">${t('close')}</button><button id="backToHomeFromOrder" class="flex-1 py-2.5 bg-black text-white rounded-full">${t('backToHome')}</button></div>`;
        document.getElementById('closeOrderConfirm').addEventListener('click', ()=> orderConfirmModal.classList.remove('active'));
        document.getElementById('backToHomeFromOrder').addEventListener('click', ()=>{ orderConfirmModal.classList.remove('active'); slideToPage(0); });
        orderConfirmModal.classList.add('active');
      }

      function openUserCenter() {
        const orders = getOrders();
        let html = `<div class="flex justify-between items-start mb-4"><h3 class="text-xl font-bold">${t('myOrders')}</h3><button id="closeUserCenter" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button></div>`;
        if(orders.length === 0) html += `<p class="text-gray-500 text-center py-4">${t('noOrders')}</p>`;
        else orders.forEach(order => {
          const date = new Date(order.time).toLocaleString();
          html += `<div class="order-item"><div class="flex justify-between"><strong>${order.product}</strong><span class="text-xs text-gray-500">${t('orderID')}: ${order.id}</span></div>
          <p class="text-sm">${order.storage} | ${order.color} | Qty: ${order.quantity || 1} | $${(order.price||0).toFixed(2)} → ${(order.discount||0).toFixed(2)} USDT</p>
          <p class="text-xs text-gray-500">${order.address.name}, ${order.address.phone}</p>
          <p class="text-xs text-gray-400">${date}</p>
          <span class="text-xs px-2 py-0.5 rounded-full bg-blue-100 text-blue-800">${t('statusPending')}</span></div>`;
        });
        document.getElementById('userCenterContent').innerHTML = html;
        document.getElementById('closeUserCenter').addEventListener('click', ()=> userCenterModal.classList.remove('active'));
        userCenterModal.classList.add('active');
      }

      function slideToPage(index) {
        if(index===0){ slider.style.transform='translateX(0)'; page1Content.classList.remove('shifted'); page2Content.classList.remove('entered'); }
        else { slider.style.transform='translateX(-50%)'; page1Content.classList.add('shifted'); page2Content.classList.add('entered'); }
      }

      let touchStartX=0;
      slider.addEventListener('touchstart', e=>touchStartX=e.changedTouches[0].screenX, {passive:true});
      slider.addEventListener('touchend', e=>{
        const diff=touchStartX-e.changedTouches[0].screenX;
        if(Math.abs(diff)>50){ const isPage1=slider.style.transform.includes('0'); if(diff>0&&isPage1) slideToPage(1); else if(diff<0&&!isPage1) slideToPage(0); }
      });

      document.getElementById('goToPriceBtn').addEventListener('click', ()=>slideToPage(1));
      document.getElementById('backToHomeBtn').addEventListener('click', ()=>slideToPage(0));
      document.getElementById('openAddressBookBtn').addEventListener('click', ()=>openAddressBookModal(false));
      document.getElementById('categoryTabs').addEventListener('click', e=>{
        if(e.target.classList.contains('category-tab')){
          document.querySelectorAll('.category-tab').forEach(t=>{t.classList.remove('active','bg-black','text-white'); t.classList.add('bg-white','border');});
          e.target.classList.add('active','bg-black','text-white'); e.target.classList.remove('bg-white','border');
          currentCategory=e.target.dataset.category; renderPriceCards();
        }
      });
      document.getElementById('languageSelect').addEventListener('change', e=>{ currentLang=e.target.value; updateAllTexts(); });
      userCenterBtn.addEventListener('click', openUserCenter);

      [productModal,addressModal,addressBookModal,paymentModal,orderConfirmModal,userCenterModal].forEach(m=>{
        m.addEventListener('click', function(e){ if(e.target===m) m.classList.remove('active'); });
      });
      pricePage.addEventListener('scroll', ()=>backToTopBtn.classList.toggle('visible', pricePage.scrollTop>400));
      backToTopBtn.addEventListener('click', ()=>pricePage.scrollTo({top:0,behavior:'smooth'}));

      mainLogo.addEventListener('animationend', () => {
        mainLogo.classList.remove('rainbow-text-animate');
        mainLogo.classList.add('rainbow-text-static');
      });

      updateAllTexts(); slider.style.transform='translateX(0)';
    })();
  </script>
</body>
</html>
