        }
        body {
            background: #0f0f11;
            color: #ffffff;
            text-align: center;
            padding: 80px 20px;

            max-width: 520px;

            padding: 20px;

            font-size: 19px;
            transition: 0.25s ease;
        }
        .link-btn:hover {
            background: #1e2026;
            border-color: #555962;
        }
