<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>BINPG</title>
  <meta name="description" content="BINPG 官方渠道导航">
  <meta name="theme-color" content="#0a0a0a">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { overflow-y: auto; overflow-x: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0a0a0a; min-height: 100vh; min-height: 100dvh; color: #ffffff;
      padding: 2rem 1.5rem; -webkit-font-smoothing: antialiased; overflow-y: auto; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; top: -40%; left: -20%; width: 80%; height: 100%;
      background: radial-gradient(circle at 50% 40%, rgba(100,120,255,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0; animation: bgGlow 8s ease-in-out infinite alternate;
    }
    body::after {
      content: ''; position: fixed; bottom: -30%; right: -15%; width: 70%; height: 90%;
      background: radial-gradient(circle at 60% 70%, rgba(255,150,80,0.04) 0%, transparent 70%);
      pointer-events: none; z-index: 0; animation: bgGlow 10s ease-in-out infinite alternate-reverse;
    }
    @keyframes bgGlow { 0% { opacity: 0.4; transform: scale(1); } 100% { opacity: 0.8; transform: scale(1.05); } }
    .container { position: relative; z-index: 1; width: 100%; max-width: 420px; margin: 0 auto; text-align: center; }
    .logo-link { display: block; text-decoration: none; margin-bottom: 2.5rem; margin-top: 1rem; }
    .logo {
      font-size: 3rem; font-weight: 900; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #6e8efb, #a777e3, #f8a5c2); background-size: 200% auto;
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      animation: logoShine 4s ease-in-out infinite; line-height: 1.1;
    }
    .logo-sub { font-size: 0.75rem; color: #555; font-weight: 400; letter-spacing: 0.04em; margin-top: 0.25rem; }
    @keyframes logoShine { 0%,100% { background-position: 0% center; } 50% { background-position: 100% center; } }
    .btn-list { display: flex; flex-direction: column; gap: 0.85rem; margin-bottom: 2.5rem; }

    /* 按钮基础样式 */
    .social-btn {
      display: flex; align-items: center; justify-content: center; padding: 0.9rem 1.5rem;
      border-radius: 3rem; text-decoration: none; color: #ffffff;
      border: 1px solid rgba(255,255,255,0.15); transition: all 0.3s cubic-bezier(0.25,0.8,0.25,1.2);
      cursor: pointer; overflow: hidden; min-height: 56px;
    }
    .social-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
    .social-btn:active { transform: scale(0.97); transition: transform 0.1s ease; }

    /* 图标与文字容器 */
    .btn-icon {
      font-size: 2rem; line-height: 1; transition: transform 0.35s ease, margin 0.35s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-text {
      white-space: nowrap; max-width: 0; overflow: hidden;
      transition: max-width 0.5s cubic-bezier(0.25,0.8,0.25,1), opacity 0.35s ease, margin-left 0.35s ease;
      opacity: 0; margin-left: 0; font-size: 1rem; font-weight: 600; letter-spacing: 0.02em;
    }
    .social-btn:hover .btn-icon { transform: scale(0.75); margin-right: 0.5rem; }
    .social-btn:hover .btn-text { max-width: 200px; opacity: 1; margin-left: 0.5rem; }

    /* 游戏按钮特殊处理：不显示文字动画 */
    .btn-game .btn-text { display: none; }
    .btn-game:hover .btn-icon { transform: none; margin-right: 0; }

    /* 各平台渐变色 */
    .btn-x { background: linear-gradient(135deg, #1a1a1a, #444); }
    .btn-ins { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .btn-fb { background: linear-gradient(135deg, #1877f2, #0c5dc7); }
    .btn-tg-main { background: linear-gradient(135deg, #2AABEE, #229ED9); }
    .btn-tg-ad { background: linear-gradient(135deg, #ff6b35, #f7931e); }
    .btn-wa { background: linear-gradient(135deg, #25D366, #128C7E); }
    .btn-game { background: linear-gradient(135deg, #2a2a2a, #3a3a3a); border-color: rgba(255,255,255,0.08); opacity: 0.85; }
    .btn-game:hover { opacity: 1; }

    .footer { font-size: 0.7rem; color: #444; letter-spacing: 0.03em; padding-bottom: 1rem; }
    @media (max-width: 480px) {
      .logo { font-size: 2.5rem; }
      .social-btn { padding: 0.8rem 1.2rem; }
      .btn-icon { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="https://binpg.com" class="logo-link" target="_blank" rel="noopener noreferrer">
      <div class="logo">BINPG</div>
      <div class="logo-sub">.com</div>
    </a>

    <div class="btn-list">
      <!-- X (Twitter) -->
      <a href="https://x.com/binpg_x" target="_blank" rel="noopener noreferrer" class="social-btn btn-x">
        <span class="btn-icon">𝕏</span>
        <span class="btn-text">X (Twitter)</span>
      </a>
      <!-- Instagram -->
      <a href="https://instagram.com/binpg_ins" target="_blank" rel="noopener noreferrer" class="social-btn btn-ins">
        <span class="btn-icon">📷</span>
        <span class="btn-text">Instagram</span>
      </a>
      <!-- Facebook -->
      <a href="https://facebook.com/binpgfb" target="_blank" rel="noopener noreferrer" class="social-btn btn-fb">
        <span class="btn-icon">📘</span>
        <span class="btn-text">Facebook</span>
      </a>
      <!-- Telegram 主频道 -->
      <a href="https://t.me/binpg" target="_blank" rel="noopener noreferrer" class="social-btn btn-tg-main">
        <span class="btn-icon">✈️</span>
        <span class="btn-text">Telegram</span>
      </a>
      <!-- WhatsApp -->
      <a href="https://wa.me/message/J2W5OJZY2N2HH1" target="_blank" rel="noopener noreferrer" class="social-btn btn-wa">
        <span class="btn-icon">💬</span>
        <span class="btn-text">WhatsApp</span>
      </a>
      <!-- 广告投放 -->
      <a href="https://t.me/ooesebot" target="_blank" rel="noopener noreferrer" class="social-btn btn-tg-ad">
        <span class="btn-icon">📢</span>
        <span class="btn-text">广告投放</span>
      </a>
      <!-- 游戏（无文字动画） -->
      <a href="https://t.me/feitoubot?start=88174156" target="_blank" rel="noopener noreferrer" class="social-btn btn-game">
        <span class="btn-icon">🎮</span>
        <span class="btn-text" style="display:none;">游戏</span>
      </a>
    </div>
    <div class="footer">© 2025 BINPG. All rights reserved.</div>
  </div>
</body>
</html>
